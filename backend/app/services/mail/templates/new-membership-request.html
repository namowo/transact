<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New membership request</title>
</head>
<body>
    <div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
        <p>Dear {{ first_name }},</p>

        <p>{{ requester_first_name }} {{ requester_last_name }} ({{ requester_email }}) has requested to join your laboratory, "{{ laboratory_name }}", on the TransAct Repository.</p>

        <p>Please review and approve or deny this request.</p>

        <p>The TransAct Team</p>
    </div>
</body>
</html>
